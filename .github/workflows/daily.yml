name: Daily Travel Article Generator

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run generator
        run: node generate.js

      - name: Commit changes
        run: |
          git config user.name "auto-bot"
          git config user.email "auto-bot@users.noreply.github.com"
          git add .
          git commit -m "daily travel article" || echo "No changes"
          git push
      - name: Generate sitemap
        run: node generate-sitemap.js
